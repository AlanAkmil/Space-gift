<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AniVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--bg2:#0d0d1a;--bgc:#111124;--bgh:#181830;
  --p:#7c3aed;--pb:#9d5cf0;--pg:#b57bf7;--pd:#4c1d95;--pm:#2e1065;
  --ac:#e879f9;
  --t1:#f0eeff;--t2:#9990bb;--tm:#5a5580;
  --b1:#1e1b38;--b2:#3d3568;
  --ff:'Space Grotesk',sans-serif;--fm:'Space Mono',monospace;
  --expo:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--pd);border-radius:3px}
::selection{background:var(--p);color:#fff}

/* NAVBAR */
#navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;padding:0 20px;background:rgba(7,7,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);gap:16px}
#logo{font-size:1.1rem;font-weight:700;color:var(--t1);cursor:pointer;white-space:nowrap}
#logo span{color:var(--pb)}
.nav-links{display:flex;gap:2px}
.nav-btn{padding:5px 12px;border-radius:7px;font-size:0.8rem;font-weight:500;color:var(--t2);background:none;border:none;cursor:pointer;font-family:var(--ff);transition:all 0.2s}
.nav-btn:hover{color:var(--t1);background:var(--bgh)}
.nav-btn.active{color:var(--pb);background:rgba(124,58,237,0.12)}
#search-wrap{margin-left:auto;position:relative;display:flex;align-items:center}
#search-wrap svg{position:absolute;left:10px;color:var(--tm);width:15px;height:15px;pointer-events:none}
#navbar-search{background:var(--bgc);border:1px solid var(--b1);border-radius:9px;padding:7px 12px 7px 32px;font-family:var(--ff);font-size:0.82rem;color:var(--t1);width:200px;outline:none;transition:all 0.2s}
#navbar-search::placeholder{color:var(--tm)}
#navbar-search:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,0.15)}

/* LAYOUT */
#app{padding-top:60px;min-height:100vh}
.container{max-width:1280px;margin:0 auto;padding:0 20px}

/* PAGES */
.page{display:none;animation:fadeUp 0.35s var(--expo) forwards}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
#hero{position:relative;height:480px;overflow:hidden;border-bottom:1px solid var(--b1)}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(3px) brightness(0.3);transform:scale(1.06);transition:background-image 0.7s ease}
#hero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(7,7,15,0.97) 0%,rgba(7,7,15,0.55) 65%,transparent 100%),linear-gradient(to top,rgba(7,7,15,0.95) 0%,transparent 55%)}
#hero-content{position:relative;z-index:1;height:100%;display:flex;align-items:flex-end;padding:40px 28px;max-width:560px}
#hero-inner{display:flex;flex-direction:column;gap:14px}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);border-radius:100px;padding:3px 11px;font-size:0.68rem;font-weight:600;color:var(--pg);letter-spacing:0.08em;text-transform:uppercase;width:fit-content}
#hero-title{font-size:clamp(1.6rem,3.5vw,2.5rem);font-weight:700;line-height:1.1;letter-spacing:-0.02em}
#hero-desc{font-size:0.88rem;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btns{display:flex;gap:10px;margin-top:4px}
.btn-p{display:inline-flex;align-items:center;gap:7px;background:var(--p);color:#fff;border:none;border-radius:9px;padding:9px 20px;font-family:var(--ff);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-p:hover{background:var(--pb);transform:translateY(-1px)}
.btn-g{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.06);color:var(--t1);border:1px solid var(--b2);border-radius:9px;padding:9px 20px;font-family:var(--ff);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-g:hover{background:rgba(255,255,255,0.1);transform:translateY(-1px)}
#hero-dots{position:absolute;bottom:20px;right:28px;display:flex;gap:7px;z-index:2}
.hdot{width:5px;height:5px;border-radius:50%;background:var(--b2);cursor:pointer;transition:all 0.2s}
.hdot.active{background:var(--pb);transform:scale(1.4)}

/* SECTIONS */
.section{padding:36px 0}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.sec-title{font-size:1rem;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:9px}
.sec-title::before{content:'';display:block;width:3px;height:16px;background:var(--pb);border-radius:2px}
.sec-more{font-size:0.78rem;font-weight:500;color:var(--pb);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;transition:gap 0.2s;font-family:var(--ff)}
.sec-more:hover{gap:7px}

/* CARD ROW */
.card-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;scrollbar-width:thin;scrollbar-color:var(--pd) transparent}
.card-row::-webkit-scrollbar{height:3px}
.card-row::-webkit-scrollbar-thumb{background:var(--pd);border-radius:2px}

/* ANIME CARD */
.acard{flex:0 0 150px;scroll-snap-align:start;cursor:pointer;opacity:0;transform:translateY(18px);transition:opacity 0.4s var(--expo),transform 0.4s var(--expo)}
.acard.vis{opacity:1;transform:translateY(0)}
.acard-img{position:relative;width:150px;height:210px;border-radius:9px;overflow:hidden;background:var(--bgc);border:1px solid var(--b1);transition:transform 0.3s var(--expo),box-shadow 0.3s}
.acard:hover .acard-img{transform:translateY(-4px) scale(1.02);box-shadow:0 14px 36px rgba(124,58,237,0.28)}
.acard-img img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.3s}
.acard-img img.loaded{opacity:1}
.acard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,15,0.88) 0%,transparent 50%);opacity:0;transition:opacity 0.3s;display:flex;align-items:flex-end;padding:10px}
.acard:hover .acard-overlay{opacity:1}
.play-btn{width:32px;height:32px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.cbadge{position:absolute;top:7px;left:7px;background:rgba(124,58,237,0.85);color:#fff;font-size:0.62rem;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:0.04em;backdrop-filter:blur(4px)}
.cscore{position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.7);color:#fbbf24;font-size:0.67rem;font-weight:700;font-family:var(--fm);padding:2px 6px;border-radius:100px;backdrop-filter:blur(4px)}
.acard-info{padding:0 2px;margin-top:8px}
.acard-title{font-size:0.78rem;font-weight:600;color:var(--t1);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.acard-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.mtag{font-size:0.65rem;color:var(--tm);font-family:var(--fm)}
.mdot{width:3px;height:3px;background:var(--b2);border-radius:50%;flex-shrink:0}
.sbadge{font-size:0.6rem;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:0.04em}
.sb-opl{background:rgba(124,58,237,0.2);color:var(--pg)}
.sb-gmu{background:rgba(232,121,249,0.15);color:#e879f9}

/* SKELETON */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,var(--bgc) 25%,var(--bgh) 50%,var(--bgc) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:9px}
.skel-card{flex:0 0 150px;display:flex;flex-direction:column;gap:9px}
.skel-img{width:150px;height:210px;border-radius:9px}
.skel-line{height:11px;border-radius:5px}

/* EP CARD */
.epcard{flex:0 0 190px;scroll-snap-align:start;cursor:pointer;opacity:0;transform:translateX(18px);transition:opacity 0.4s var(--expo),transform 0.4s var(--expo)}
.epcard.vis{opacity:1;transform:translateX(0)}
.epcard-thumb{width:190px;height:107px;border-radius:8px;overflow:hidden;background:var(--bgc);border:1px solid var(--b1);position:relative;transition:transform 0.3s var(--expo),box-shadow 0.3s}
.epcard:hover .epcard-thumb{transform:translateY(-3px);box-shadow:0 10px 28px rgba(124,58,237,0.22)}
.epcard-thumb img{width:100%;height:100%;object-fit:cover}
.epnum{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,0.8);color:var(--t2);font-size:0.62rem;font-family:var(--fm);padding:2px 6px;border-radius:4px}
.epcard-title{font-size:0.76rem;font-weight:600;color:var(--t1);line-height:1.3;margin-top:7px;padding:0 2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* GRID */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:18px}
.agrid .acard{flex:unset;width:100%}
.agrid .acard-img{width:100%;height:0;padding-bottom:140%;position:relative}
.agrid .acard-img img{position:absolute;inset:0;width:100%;height:100%}

/* FILTER */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:28px}
.fchip{padding:5px 14px;border-radius:100px;font-size:0.77rem;font-weight:500;border:1px solid var(--b1);background:var(--bgc);color:var(--t2);cursor:pointer;transition:all 0.2s;font-family:var(--ff)}
.fchip:hover{border-color:var(--p);color:var(--t1)}
.fchip.active{background:var(--p);border-color:var(--p);color:#fff}

/* DETAIL */
#detail-hero{position:relative;min-height:380px;display:flex;align-items:flex-end;overflow:hidden}
#detail-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(18px) brightness(0.22);transform:scale(1.1)}
#detail-content{position:relative;z-index:1;display:flex;gap:28px;align-items:flex-end;padding:40px 24px;width:100%;background:linear-gradient(to top,var(--bg) 0%,transparent 100%)}
#detail-poster{width:160px;height:224px;flex-shrink:0;border-radius:10px;overflow:hidden;box-shadow:0 20px 56px rgba(0,0,0,0.6);border:1px solid var(--b1)}
#detail-poster img{width:100%;height:100%;object-fit:cover}
#detail-info{flex:1;display:flex;flex-direction:column;gap:10px}
#detail-title{font-size:clamp(1.3rem,3vw,2rem);font-weight:700;letter-spacing:-0.02em;line-height:1.1}
#detail-jp{font-size:0.82rem;color:var(--tm);font-family:var(--fm)}
.dtags{display:flex;gap:6px;flex-wrap:wrap}
.dtag{padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:500;background:rgba(124,58,237,0.15);color:var(--pg);border:1px solid rgba(124,58,237,0.3)}
.dstats{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.dstat{display:flex;flex-direction:column;gap:2px}
.dstat-lbl{font-size:0.67rem;color:var(--tm);font-family:var(--fm);text-transform:uppercase;letter-spacing:0.08em}
.dstat-val{font-size:0.95rem;font-weight:600;color:var(--t1)}
.dstat-val.score{color:#fbbf24}
#detail-desc{font-size:0.87rem;color:var(--t2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;transition:all 0.3s}
#detail-desc.exp{-webkit-line-clamp:unset}
#desc-toggle{background:none;border:none;color:var(--pb);font-size:0.78rem;cursor:pointer;margin-top:6px;font-family:var(--ff)}

/* EP LIST */
.ep-list{display:flex;flex-direction:column;gap:3px}
.ep-item{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:8px;cursor:pointer;transition:background 0.15s;border:1px solid transparent;text-decoration:none}
.ep-item:hover{background:var(--bgh);border-color:var(--b1)}
.ep-item.cur{background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.3)}
.ep-num{font-family:var(--fm);font-size:0.77rem;color:var(--pb);width:34px;flex-shrink:0;font-weight:700}
.ep-title{font-size:0.83rem;font-weight:500;flex:1;color:var(--t1)}
.ep-date{font-size:0.7rem;color:var(--tm);font-family:var(--fm)}

/* WATCH */
#watch-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;padding:20px;max-width:1280px;margin:0 auto}
#player-wrap{border-radius:10px;overflow:hidden;background:#000;aspect-ratio:16/9;position:relative;box-shadow:0 0 40px rgba(124,58,237,0.12)}
#player-wrap iframe{width:100%;height:100%;border:none}
#player-placeholder{display:flex;align-items:center;justify-content:center;height:100%;background:var(--bgc);color:var(--tm);font-size:0.9rem;aspect-ratio:16/9}
.psel{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.pbtn{padding:5px 12px;border-radius:7px;font-size:0.77rem;font-weight:500;background:var(--bgc);border:1px solid var(--b1);color:var(--t2);cursor:pointer;transition:all 0.2s;font-family:var(--ff)}
.pbtn:hover{border-color:var(--p);color:var(--t1)}
.pbtn.active{background:var(--p);border-color:var(--p);color:#fff}
.dl-section{margin-top:18px}
.dl-title{font-size:0.78rem;font-weight:700;color:var(--t2);margin-bottom:9px;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--fm)}
.dl-grid{display:flex;flex-wrap:wrap;gap:7px}
.dl-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-size:0.74rem;font-weight:500;background:var(--bgc);border:1px solid var(--b1);color:var(--t1);text-decoration:none;transition:all 0.2s}
.dl-btn:hover{background:var(--bgh);border-color:var(--p)}
.ep-sidebar{display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 100px);position:sticky;top:76px}
.ep-sidebar-title{font-size:0.83rem;font-weight:700;color:var(--t1);padding-bottom:10px;border-bottom:1px solid var(--b1)}
.ep-sidebar-list{overflow-y:auto;display:flex;flex-direction:column;gap:2px;flex:1}

/* SEARCH PAGE */
.search-wrap-big{position:relative;margin-bottom:28px}
.search-wrap-big svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--tm);width:19px;height:19px}
#search-big{width:100%;background:var(--bgc);border:1px solid var(--b1);border-radius:12px;padding:14px 20px 14px 50px;font-family:var(--ff);font-size:1rem;color:var(--t1);outline:none;transition:all 0.2s}
#search-big::placeholder{color:var(--tm)}
#search-big:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(124,58,237,0.12)}

/* EMPTY / LOADING */
.empty{display:flex;flex-direction:column;align-items:center;gap:14px;padding:70px 20px;color:var(--tm);text-align:center}
.empty-icon{font-size:2.8rem}
.empty-title{font-size:1rem;font-weight:600;color:var(--t2)}
.spinner{width:32px;height:32px;border:3px solid var(--b1);border-top-color:var(--pb);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:70px 20px;color:var(--tm);font-size:0.85rem}

/* PAGINATION */
.pages{display:flex;justify-content:center;gap:7px;padding:36px 0}
.pgbtn{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:600;background:var(--bgc);border:1px solid var(--b1);color:var(--t2);cursor:pointer;transition:all 0.2s;font-family:var(--ff)}
.pgbtn:hover{border-color:var(--p);color:var(--t1)}
.pgbtn.active{background:var(--p);border-color:var(--p);color:#fff}
.pgbtn:disabled{opacity:0.3;cursor:not-allowed}

/* MOBILE */
@media(max-width:768px){
  #navbar{padding:0 14px}
  .nav-links{display:none}
  #navbar-search{width:160px}
  #hero{height:380px}
  #hero-content{padding:28px 16px}
  #watch-layout{grid-template-columns:1fr}
  .ep-sidebar{max-height:350px;position:static}
  #detail-content{flex-direction:column;align-items:flex-start;padding:20px 16px;gap:16px}
  #detail-poster{width:120px;height:168px}
  .container{padding:0 14px}
  #watch-layout{padding:14px}
}
</style>
</head>
<body>

<nav id="navbar">
  <div id="logo" onclick="nav('home')">Ani<span>Vault</span></div>
  <div class="nav-links">
    <button class="nav-btn active" id="nb-home" onclick="nav('home')">Beranda</button>
    <button class="nav-btn" id="nb-series" onclick="nav('series')">Series</button>
    <button class="nav-btn" id="nb-ongoing" onclick="navSeries('ongoing')">Ongoing</button>
    <button class="nav-btn" id="nb-completed" onclick="navSeries('completed')">Completed</button>
  </div>
  <div id="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="navbar-search" placeholder="Cari anime..." oninput="handleNavSearch(this.value)"/>
  </div>
</nav>

<div id="app">

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <!-- Hero -->
  <div id="hero">
    <div id="hero-bg"></div>
    <div id="hero-grad"></div>
    <div id="hero-content">
      <div id="hero-inner">
        <div class="hero-badge">⭐ Trending</div>
        <div id="hero-title">Memuat...</div>
        <div id="hero-desc"></div>
        <div class="hero-btns">
          <button class="btn-p" id="hero-watch">▶ Tonton</button>
          <button class="btn-g" id="hero-info">Info</button>
        </div>
      </div>
    </div>
    <div id="hero-dots"></div>
  </div>

  <!-- Latest Episodes -->
  <div class="section">
    <div class="container">
      <div class="sec-hdr"><h2 class="sec-title">Episode Terbaru</h2></div>
      <div class="card-row" id="row-latest"></div>
    </div>
  </div>

  <!-- Trending -->
  <div class="section">
    <div class="container">
      <div class="sec-hdr">
        <h2 class="sec-title">Trending</h2>
        <button class="sec-more" onclick="navSeries('popular')">Lihat Semua →</button>
      </div>
      <div class="card-row" id="row-trending"></div>
    </div>
  </div>

  <!-- Recently Added -->
  <div class="section">
    <div class="container">
      <div class="sec-hdr">
        <h2 class="sec-title">Baru Ditambah</h2>
        <button class="sec-more" onclick="navSeries('recently')">Lihat Semua →</button>
      </div>
      <div class="card-row" id="row-recently"></div>
    </div>
  </div>
</div>

<!-- SERIES PAGE -->
<div id="page-series" class="page">
  <div class="container" style="padding-top:36px;padding-bottom:56px">
    <h1 id="series-heading" style="font-size:1.4rem;font-weight:700;margin-bottom:22px;letter-spacing:-0.02em">Semua Series</h1>
    <div class="filter-bar" id="sort-filters"></div>
    <div class="filter-bar" id="genre-filters"></div>
    <div class="agrid" id="series-grid"></div>
    <div class="pages" id="series-pages"></div>
  </div>
</div>

<!-- SEARCH PAGE -->
<div id="page-search" class="page">
  <div class="container" style="padding-top:32px;padding-bottom:56px">
    <div class="search-wrap-big">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-big" placeholder="Cari judul anime..." oninput="handleSearchInput(this.value)" autofocus/>
    </div>
    <div id="search-info" style="font-size:0.82rem;color:var(--tm);margin-bottom:20px"></div>
    <div class="agrid" id="search-grid"></div>
    <div id="search-empty" class="empty" style="display:none">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Tidak ditemukan</div>
    </div>
    <div id="search-start" class="empty">
      <div class="empty-icon">🎌</div>
      <div class="empty-title">Mau nonton apa?</div>
    </div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div id="page-detail" class="page">
  <div id="detail-hero">
    <div id="detail-bg"></div>
    <div id="detail-content">
      <div id="detail-poster"><img id="detail-poster-img" src="" alt=""/></div>
      <div id="detail-info">
        <div id="detail-jp"></div>
        <h1 id="detail-title"></h1>
        <div class="dtags" id="detail-tags"></div>
        <div class="dstats" id="detail-stats"></div>
      </div>
    </div>
  </div>
  <div class="container" style="padding-top:28px;padding-bottom:56px">
    <p id="detail-desc"></p>
    <button id="desc-toggle" onclick="toggleDesc()" style="display:none">Baca selengkapnya ↓</button>
    <div style="margin-top:32px">
      <div style="font-size:0.78rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;font-family:var(--fm)" id="ep-count-label">Daftar Episode</div>
      <div class="ep-list" id="detail-ep-list"></div>
    </div>
  </div>
</div>

<!-- WATCH PAGE -->
<div id="page-watch" class="page">
  <div id="watch-layout">
    <div>
      <button onclick="goBackDetail()" style="background:none;border:none;color:var(--tm);font-size:0.78rem;cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:10px;font-family:var(--ff)">← <span id="watch-series-title"></span></button>
      <div style="font-size:0.95rem;font-weight:600;margin-bottom:14px;color:var(--t1)" id="watch-ep-label"></div>
      <div id="player-wrap">
        <div id="player-placeholder">Pilih server di bawah</div>
      </div>
      <div class="psel" id="stream-btns"></div>
      <div class="dl-section" id="dl-section" style="display:none">
        <div class="dl-title">Download</div>
        <div class="dl-grid" id="dl-grid"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px" id="ep-nav"></div>
    </div>
    <div class="ep-sidebar">
      <div class="ep-sidebar-title">Daftar Episode <span id="sidebar-ep-count" style="color:var(--tm);font-weight:400"></span></div>
      <div class="ep-sidebar-list" id="sidebar-ep-list"></div>
    </div>
  </div>
</div>

</div><!-- #app -->

<script>
// ============ STATE ============
let state = {
  page: 'home',
  heroItems: [],
  heroCurrent: 0,
  heroTimer: null,
  currentSlug: '',
  currentEp: '',
  currentSource: '',
  currentDetail: null,
  seriesPage: 1,
  seriesSort: 'recently',
  seriesGenre: '',
  seriesStatus: '',
  searchTimer: null,
};

// ============ ROUTER ============
function nav(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const nb = document.getElementById('nb-' + page);
  if (nb) nb.classList.add('active');
  state.page = page;
  window.scrollTo(0, 0);
}

function navSeries(status) {
  state.seriesStatus = status || '';
  state.seriesPage = 1;
  state.seriesSort = status === 'popular' ? 'popular' : 'recently';
  nav('series');
  loadSeries();
}

function navDetail(slug, source) {
  state.currentSlug = slug;
  state.currentSource = source || '';
  nav('detail');
  loadDetail(slug, source);
}

function navWatch(slug, ep, source) {
  state.currentSlug = slug;
  state.currentEp = ep;
  state.currentSource = source || '';
  nav('watch');
  loadWatch(slug, ep, source);
}

function goBackDetail() {
  navDetail(state.currentSlug, state.currentSource);
}

// ============ API ============
async function api(path) {
  const res = await fetch(path);
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Error');
  return data;
}

// ============ INTERSECTION OBSERVER ============
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
}, { threshold: 0.08, rootMargin: '40px' });

function observe(el) { io.observe(el); }

// ============ HELPERS ============
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return ''; }
}

function skelCards(n, row) {
  row.innerHTML = Array.from({length: n}, () => `
    <div class="skel-card">
      <div class="skel skel-img"></div>
      <div class="skel skel-line" style="width:80%"></div>
      <div class="skel skel-line" style="width:50%"></div>
    </div>`).join('');
}

function makeCard(anime, i) {
  const slug = anime.slug || anime.url?.split('/').pop() || '';
  const src = anime.source || 'oploverz';
  const div = document.createElement('div');
  div.className = 'acard';
  div.style.transitionDelay = (i * 38) + 'ms';
  div.innerHTML = `
    <div class="acard-img">
      <img data-src="${anime.poster || ''}" alt="${anime.title || ''}"/>
      ${anime.status ? `<div class="cbadge">${anime.status}</div>` : ''}
      ${anime.score ? `<div class="cscore">★ ${anime.score}</div>` : ''}
      <div class="acard-overlay"><div class="play-btn">▶</div></div>
    </div>
    <div class="acard-info">
      <div class="acard-title">${anime.title || ''}</div>
      <div class="acard-meta">
        ${anime.totalEpisodes ? `<span class="mtag">${anime.totalEpisodes} eps</span>` : ''}
        ${anime.releaseType ? `<span class="mdot"></span><span class="mtag">${anime.releaseType}</span>` : ''}
        <span class="sbadge ${src === 'gomunime' ? 'sb-gmu' : 'sb-opl'}">${src === 'gomunime' ? 'GMN' : 'OPL'}</span>
      </div>
    </div>`;
  div.onclick = () => navDetail(slug, src === 'gomunime' ? 'gomunime' : '');
  // lazy load img
  const img = div.querySelector('img');
  if (img.dataset.src) {
    const obs2 = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { img.src = img.dataset.src; img.onload = () => img.classList.add('loaded'); obs2.disconnect(); }
    }, {rootMargin:'100px'});
    obs2.observe(img);
  }
  observe(div);
  return div;
}

function renderCards(items, container) {
  container.innerHTML = '';
  items.forEach((a, i) => container.appendChild(makeCard(a, i)));
}

// ============ HOME ============
async function loadHome() {
  const latestRow = document.getElementById('row-latest');
  const trendRow = document.getElementById('row-trending');
  const recentRow = document.getElementById('row-recently');
  skelCards(8, latestRow); skelCards(8, trendRow); skelCards(8, recentRow);

  try {
    const res = await api('/api/home');
    const d = res.data;

    // Hero
    state.heroItems = d.trending?.slice(0, 5) || [];
    renderHero();

    // Rows
    if (d.latestEpisodes?.length) {
      latestRow.innerHTML = '';
      d.latestEpisodes.forEach((ep, i) => {
        const div = document.createElement('div');
        div.className = 'epcard';
        div.style.transitionDelay = (i * 38) + 'ms';
        div.innerHTML = `
          <div class="epcard-thumb">
            ${ep.poster ? `<img src="${ep.poster}" alt="${ep.seriesTitle || ''}" loading="lazy"/>` : ''}
            <div class="epnum">EP ${ep.episodeNumber || '?'}</div>
          </div>
          <div class="epcard-title">${ep.seriesTitle || ''}</div>`;
        div.onclick = () => {
          if (ep.seriesSlug && ep.episodeNumber && ep.episodeNumber !== '?') navWatch(ep.seriesSlug, ep.episodeNumber, ep.source || '');
          else if (ep.seriesSlug) navDetail(ep.seriesSlug, ep.source || '');
        };
        observe(div);
        latestRow.appendChild(div);
      });
    } else {
      latestRow.innerHTML = '<div style="color:var(--tm);font-size:0.82rem;padding:20px">Tidak ada data</div>';
    }

    renderCards(d.trending || [], trendRow);
    renderCards(d.recently || [], recentRow);
  } catch(e) {
    console.error(e);
    latestRow.innerHTML = '<div style="color:var(--tm);padding:20px;font-size:0.82rem">Gagal memuat</div>';
  }
}

function renderHero() {
  const items = state.heroItems;
  if (!items.length) return;
  const item = items[state.heroCurrent];
  document.getElementById('hero-bg').style.backgroundImage = `url(${item.poster || ''})`;
  document.getElementById('hero-title').textContent = item.title || '';
  document.getElementById('hero-desc').textContent = item.description || '';
  const slug = item.slug || '';
  const src = item.source || '';
  document.getElementById('hero-watch').onclick = () => navDetail(slug, src);
  document.getElementById('hero-info').onclick = () => navDetail(slug, src);
  // dots
  const dots = document.getElementById('hero-dots');
  dots.innerHTML = items.map((_, i) => `<div class="hdot ${i === state.heroCurrent ? 'active' : ''}" onclick="setHero(${i})"></div>`).join('');
  // badge
  const badge = document.querySelector('#hero-inner .hero-badge');
  if (badge) badge.innerHTML = `⭐ ${item.status || 'Trending'}`;
}

function setHero(i) {
  state.heroCurrent = i;
  renderHero();
  clearInterval(state.heroTimer);
  state.heroTimer = setInterval(() => { state.heroCurrent = (state.heroCurrent + 1) % state.heroItems.length; renderHero(); }, 5000);
}

// ============ SERIES ============
const GENRES = ['Action','Adventure','Comedy','Drama','Fantasy','Horror','Isekai','Mecha','Mystery','Romance','Sci-Fi','Shounen','Slice of Life','Sports','Supernatural','Thriller'];
const SORTS = [{v:'recently',l:'Terbaru'},{v:'popular',l:'Populer'},{v:'score',l:'Rating'}];

function initSeriesFilters() {
  const sf = document.getElementById('sort-filters');
  const gf = document.getElementById('genre-filters');
  sf.innerHTML = SORTS.map(s => `<button class="fchip ${state.seriesSort===s.v?'active':''}" onclick="setSort('${s.v}')">${s.l}</button>`).join('') +
    '<span style="width:1px;background:var(--b1);margin:0 4px;display:inline-block"></span>' +
    ['ongoing','completed'].map(s => `<button class="fchip ${state.seriesStatus===s?'active':''}" onclick="toggleStatus('${s}')">${s==='ongoing'?'Ongoing':'Completed'}</button>`).join('');
  gf.innerHTML = `<button class="fchip ${!state.seriesGenre?'active':''}" onclick="setGenre('')">Semua</button>` +
    GENRES.map(g => `<button class="fchip ${state.seriesGenre===g?'active':''}" onclick="setGenre('${g}')">${g}</button>`).join('');
}

function setSort(v) { state.seriesSort = v; state.seriesPage = 1; loadSeries(); }
function toggleStatus(s) { state.seriesStatus = state.seriesStatus === s ? '' : s; state.seriesPage = 1; loadSeries(); }
function setGenre(g) { state.seriesGenre = g; state.seriesPage = 1; loadSeries(); }

async function loadSeries() {
  initSeriesFilters();
  const heading = document.getElementById('series-heading');
  heading.textContent = state.seriesStatus === 'ongoing' ? 'Ongoing' : state.seriesStatus === 'completed' ? 'Completed' : 'Semua Series';
  const grid = document.getElementById('series-grid');
  grid.innerHTML = Array.from({length:20},()=>`<div style="display:flex;flex-direction:column;gap:9px"><div class="skel" style="width:100%;padding-bottom:140%;border-radius:9px"></div><div class="skel skel-line" style="width:80%"></div></div>`).join('');
  document.getElementById('series-pages').innerHTML = '';
  try {
    const params = new URLSearchParams({ page: state.seriesPage, sort: state.seriesSort });
    if (state.seriesGenre) params.set('genre', state.seriesGenre);
    if (state.seriesStatus) params.set('status', state.seriesStatus);
    const res = await api('/api/series?' + params);
    renderCards(res.items || [], grid);
    renderPages(res.pagination, 'series-pages', (p) => { state.seriesPage = p; loadSeries(); });
  } catch(e) {
    grid.innerHTML = `<div style="color:var(--tm);font-size:0.82rem;grid-column:1/-1;padding:20px">Gagal memuat: ${e.message}</div>`;
  }
}

function renderPages(pg, id, cb) {
  if (!pg || pg.lastPage <= 1) return;
  const el = document.getElementById(id);
  const cur = pg.currentPage, last = pg.lastPage;
  let pages = [];
  if (last <= 5) pages = Array.from({length:last},(_,i)=>i+1);
  else if (cur <= 3) pages = [1,2,3,4,5];
  else if (cur >= last-2) pages = [last-4,last-3,last-2,last-1,last];
  else pages = [cur-2,cur-1,cur,cur+1,cur+2];
  el.innerHTML = `<button class="pgbtn" ${cur<=1?'disabled':''} onclick="(${cb.toString()})(${cur-1})">‹</button>` +
    pages.map(p=>`<button class="pgbtn ${p===cur?'active':''}" onclick="(${cb.toString()})(${p})">${p}</button>`).join('') +
    `<button class="pgbtn" ${cur>=last?'disabled':''} onclick="(${cb.toString()})(${cur+1})">›</button>`;
}

// ============ SEARCH ============
function handleNavSearch(val) {
  if (val.trim()) {
    nav('search');
    document.getElementById('search-big').value = val;
    handleSearchInput(val);
  }
}

function handleSearchInput(val) {
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(() => doSearch(val), 420);
}

async function doSearch(q) {
  const grid = document.getElementById('search-grid');
  const info = document.getElementById('search-info');
  const empty = document.getElementById('search-empty');
  const start = document.getElementById('search-start');
  if (!q.trim()) { grid.innerHTML=''; info.textContent=''; empty.style.display='none'; start.style.display='flex'; return; }
  start.style.display = 'none';
  grid.innerHTML = Array.from({length:8},()=>`<div style="display:flex;flex-direction:column;gap:9px"><div class="skel" style="width:100%;padding-bottom:140%;border-radius:9px"></div><div class="skel skel-line" style="width:80%"></div></div>`).join('');
  info.textContent = 'Mencari...';
  empty.style.display = 'none';
  try {
    const res = await api(`/api/search?q=${encodeURIComponent(q)}`);
    info.innerHTML = `<span style="color:var(--t2)">${res.total} hasil untuk</span> "<span style="color:var(--pg)">${q}</span>"`;
    if (!res.items?.length) { grid.innerHTML=''; empty.style.display='flex'; return; }
    renderCards(res.items, grid);
  } catch(e) {
    info.textContent = 'Gagal: ' + e.message;
    grid.innerHTML = '';
  }
}

// ============ DETAIL ============
async function loadDetail(slug, source) {
  document.getElementById('detail-title').textContent = 'Memuat...';
  document.getElementById('detail-tags').innerHTML = '';
  document.getElementById('detail-stats').innerHTML = '';
  document.getElementById('detail-ep-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('detail-desc').textContent = '';
  document.getElementById('desc-toggle').style.display = 'none';
  try {
    const params = new URLSearchParams({ slug });
    if (source) params.set('source', source);
    const res = await api('/api/detail?' + params);
    const d = res.data;
    state.currentDetail = d;
    // BG + poster
    document.getElementById('detail-bg').style.backgroundImage = `url(${d.poster || ''})`;
    document.getElementById('detail-poster-img').src = d.poster || '';
    document.getElementById('detail-title').textContent = d.title || '';
    document.getElementById('detail-jp').textContent = d.japaneseTitle || '';
    // tags
    document.getElementById('detail-tags').innerHTML = (d.genres || []).map(g=>`<span class="dtag">${g}</span>`).join('');
    // stats
    const stats = [];
    if (d.score) stats.push(`<div class="dstat"><span class="dstat-lbl">Score</span><span class="dstat-val score">★ ${d.score}</span></div>`);
    if (d.status) stats.push(`<div class="dstat"><span class="dstat-lbl">Status</span><span class="dstat-val">${d.status}</span></div>`);
    if (d.totalEpisodes) stats.push(`<div class="dstat"><span class="dstat-lbl">Episode</span><span class="dstat-val">${d.totalEpisodes}</span></div>`);
    if (d.studio) stats.push(`<div class="dstat"><span class="dstat-lbl">Studio</span><span class="dstat-val">${d.studio}</span></div>`);
    document.getElementById('detail-stats').innerHTML = stats.join('');
    // desc
    const descEl = document.getElementById('detail-desc');
    descEl.textContent = d.description || '';
    descEl.classList.remove('exp');
    if ((d.description || '').length > 200) document.getElementById('desc-toggle').style.display = 'block';
    // episodes
    document.getElementById('ep-count-label').textContent = `Daftar Episode (${d.episodes?.length || 0})`;
    const epList = document.getElementById('detail-ep-list');
    if (d.episodes?.length) {
      epList.innerHTML = d.episodes.map(ep => `
        <div class="ep-item" onclick="navWatch('${slug}','${ep.episodeNumber}','${source||''}')">
          <span class="ep-num">EP ${ep.episodeNumber}</span>
          <span class="ep-title">${ep.title || 'Episode ' + ep.episodeNumber}</span>
          ${ep.releasedAt ? `<span class="ep-date">${fmtDate(ep.releasedAt)}</span>` : ''}
        </div>`).join('');
    } else {
      epList.innerHTML = '<div style="color:var(--tm);font-size:0.82rem;padding:16px">Belum ada episode</div>';
    }
  } catch(e) {
    document.getElementById('detail-title').textContent = 'Gagal memuat';
    document.getElementById('detail-ep-list').innerHTML = `<div style="color:var(--tm);font-size:0.82rem;padding:16px">${e.message}</div>`;
  }
}

function toggleDesc() {
  const el = document.getElementById('detail-desc');
  const btn = document.getElementById('desc-toggle');
  el.classList.toggle('exp');
  btn.textContent = el.classList.contains('exp') ? 'Tutup ↑' : 'Baca selengkapnya ↓';
}

// ============ WATCH ============
async function loadWatch(slug, ep, source) {
  document.getElementById('watch-series-title').textContent = '...';
  document.getElementById('watch-ep-label').textContent = 'Episode ' + ep;
  document.getElementById('player-wrap').innerHTML = '<div id="player-placeholder">Memuat...</div>';
  document.getElementById('stream-btns').innerHTML = '';
  document.getElementById('dl-section').style.display = 'none';
  document.getElementById('sidebar-ep-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('ep-nav').innerHTML = '';

  try {
    const params = new URLSearchParams({ slug, ep });
    if (source) params.set('source', source);
    const res = await api('/api/watch?' + params);
    const d = res.data;

    document.getElementById('watch-series-title').textContent = d.seriesTitle || slug;
    document.getElementById('watch-ep-label').innerHTML = `Episode ${ep} ${d.subbed ? `<span style="margin-left:8px;font-size:0.72rem;color:var(--pg);background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px">${d.subbed}</span>` : ''}`;

    // Streams
    const streams = d.streamUrls || [];
    const streamBtns = document.getElementById('stream-btns');
    if (streams.length) {
      streamBtns.innerHTML = streams.map((s,i)=>`<button class="pbtn ${i===0?'active':''}" onclick="setStream('${encodeURIComponent(s.url)}',this)">${s.label||'Server '+(i+1)}</button>`).join('');
      setStreamUrl(streams[0].url);
    } else {
      document.getElementById('player-wrap').innerHTML = '<div id="player-placeholder">Tidak ada stream</div>';
    }

    // Downloads
    const dls = d.downloadUrls || [];
    if (dls.length) {
      document.getElementById('dl-section').style.display = 'block';
      document.getElementById('dl-grid').innerHTML = dls.map(dl=>`<a href="${dl.url}" target="_blank" rel="noopener" class="dl-btn">↓ ${dl.quality||''} ${dl.format?.toUpperCase()||''} ${dl.host?'· '+dl.host:''}</a>`).join('');
    }

    // Sidebar episodes
    const eps = d.allEpisodes || state.currentDetail?.episodes || [];
    document.getElementById('sidebar-ep-count').textContent = `(${eps.length})`;
    const sideList = document.getElementById('sidebar-ep-list');
    sideList.innerHTML = eps.map(e=>`
      <div class="ep-item ${e.episodeNumber==ep?'cur':''}" onclick="navWatch('${slug}','${e.episodeNumber}','${source||''}')">
        <span class="ep-num">EP ${e.episodeNumber}</span>
        <span class="ep-title" style="font-size:0.78rem">Episode ${e.episodeNumber}</span>
        ${e.releasedAt?`<span class="ep-date">${fmtDate(e.releasedAt)}</span>`:''}
      </div>`).join('');
    // scroll to active
    setTimeout(() => { const cur = sideList.querySelector('.cur'); if(cur) cur.scrollIntoView({block:'center'}); }, 100);

    // Nav prev/next
    const epNum = parseInt(ep);
    const hasNext = eps.find(e => parseInt(e.episodeNumber) === epNum + 1);
    const hasPrev = epNum > 1;
    document.getElementById('ep-nav').innerHTML =
      (hasPrev ? `<button class="btn-g" onclick="navWatch('${slug}',${epNum-1},'${source||''}')">← Ep ${epNum-1}</button>` : '') +
      (hasNext ? `<button class="btn-p" onclick="navWatch('${slug}',${epNum+1},'${source||''}')">Ep ${epNum+1} →</button>` : '');

  } catch(e) {
    document.getElementById('player-wrap').innerHTML = `<div id="player-placeholder">Error: ${e.message}</div>`;
  }
}

function setStreamUrl(url) {
  document.getElementById('player-wrap').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay;encrypted-media"></iframe>`;
}

function setStream(encodedUrl, btn) {
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  setStreamUrl(decodeURIComponent(encodedUrl));
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', () => {
  loadHome();
  state.heroTimer = setInterval(() => {
    if (state.heroItems.length) { state.heroCurrent = (state.heroCurrent+1) % state.heroItems.length; renderHero(); }
  }, 5000);
});
</script>
</body>
</html>
